<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Themis — Loader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; display: flex; min-height: 100vh; }
  .half { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 32px; }
  .light { background: #fafcfb; color: #1a2b26; }
  .dark  { background: #0c1512; color: #d5e8e1; }
  .loader { width: 110px; }
  .loader img, .loader object { width: 100%; height: auto; display: block; }
  .label { font-size: 13px; letter-spacing: .12em; text-transform: uppercase; opacity: .55; }
  .sizes { display: flex; align-items: flex-end; gap: 28px; }
  .s48 { width: 48px; } .s72 { width: 72px; }
</style>
</head>
<body>
  <div class="half light">
    <div class="loader"><img src="themis-loader.svg" alt="Chargement…"></div>
    <div class="sizes">
      <img class="s48" src="themis-loader.svg" alt="">
      <img class="s72" src="themis-loader.svg" alt="">
    </div>
    <div class="label">Fond clair</div>
  </div>
  <div class="half dark">
    <div class="loader"><img src="themis-loader.svg" alt="Chargement…"></div>
    <div class="sizes">
      <img class="s48" src="themis-loader.svg" alt="">
      <img class="s72" src="themis-loader.svg" alt="">
    </div>
    <div class="label">Fond sombre</div>
  </div>
</body>
</html>
