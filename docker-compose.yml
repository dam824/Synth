# ---------------------------------------------------------------------------
# Développement local : PostgreSQL uniquement.
# Next.js tourne en natif (npm run dev) et se connecte sur localhost:5432.
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    container_name: synth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synth}
      POSTGRES_DB: ${POSTGRES_DB:-synth}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - synth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synth} -d ${POSTGRES_DB:-synth}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  synth_pgdata:
