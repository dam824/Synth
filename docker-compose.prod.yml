# ---------------------------------------------------------------------------
# Production future (VPS OVH) : app Next.js + PostgreSQL + Caddy (HTTPS auto).
# Lancer : docker compose -f docker-compose.prod.yml up -d --build
# Redis pourra être ajouté ici plus tard (non activé pour l'instant).
# ---------------------------------------------------------------------------

services:
  postgres:
    image: postgres:16-alpine
    container_name: synth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - synth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: synth-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # En prod, l'app parle à Postgres via le nom de service "postgres".
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      JUDGE_MODEL: ${JUDGE_MODEL}
    # Applique les migrations puis démarre le serveur.
    command: sh -c "npx prisma migrate deploy && node server.js"
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: synth-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - synth_caddy_data:/data
      - synth_caddy_config:/config

volumes:
  synth_pgdata:
  synth_caddy_data:
  synth_caddy_config:
